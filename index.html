    <script>
      // Safety wrapper to ensure window.fetch is writable even in sandboxed iframes
      (function() {
        try {
          var originalFetch = window.fetch;
          var currentFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return currentFetch;
            },
            set: function(val) {
              currentFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Safety override for window.fetch setter was bypassed:", e);
        }
      })();
    </script>
